<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Ticket Booking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141E30,#243B55);
}

.container{
    width:420px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#fff;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input, select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

select option{
    color:black;
}

input::placeholder{
    color:#ddd;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(255,75,43,0.4);
}

.ticket{
    display:none;
    margin-top:25px;
    background:white;
    color:#333;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.ticket h2{
    color:#ff4b2b;
    margin-bottom:15px;
}

.ticket p{
    margin:8px 0;
}
</style>
</head>
<body>

<div class="container">
    <h1>🎬 Movie Ticket Booking</h1>

    <div class="input-group">
        <label>Customer Name</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="input-group">
        <label>Select Movie</label>
        <select id="movie">
            <option>Avengers Endgame</option>
            <option>Interstellar</option>
            <option>Inception</option>
            <option>Jawan</option>
            <option>Pushpa 2</option>
        </select>
    </div>

    <div class="input-group">
        <label>Number of Tickets</label>
        <input type="number" id="tickets" value="1" min="1">
    </div>

    <div class="input-group">
        <label>Show Timing</label>
        <select id="time">
            <option>10:00 AM</option>
            <option>1:00 PM</option>
            <option>4:00 PM</option>
            <option>8:00 PM</option>
        </select>
    </div>

    <button onclick="bookTicket()">Book Now</button>

    <div class="ticket" id="ticket">
        <h2>🎟 Booking Confirmed</h2>
        <p id="customer"></p>
        <p id="movieName"></p>
        <p id="showTime"></p>
        <p id="ticketCount"></p>
    </div>
</div>

<script>
function bookTicket(){
    let name = document.getElementById("name").value;
    let movie = document.getElementById("movie").value;
    let tickets = document.getElementById("tickets").value;
    let time = document.getElementById("time").value;

    if(name === ""){
        alert("Please enter your name");
        return;
    }

    document.getElementById("customer").innerHTML =
        "<strong>Name:</strong> " + name;

    document.getElementById("movieName").innerHTML =
        "<strong>Movie:</strong> " + movie;

    document.getElementById("showTime").innerHTML =
        "<strong>Show Time:</strong> " + time;

    document.getElementById("ticketCount").innerHTML =
        "<strong>Tickets:</strong> " + tickets;

    document.getElementById("ticket").style.display = "block";
}
</script>

</body>
</html>
